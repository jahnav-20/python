<!DOCTYPE html>
<html>
<head>
    <title>Menu Card</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .menu-card{
            width:350px;
            background:white;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.3);
            padding:20px;
        }

        .menu-card h1{
            text-align:center;
            color:darkred;
            border-bottom:2px solid darkred;
            padding-bottom:10px;
        }

        .item{
            display:flex;
            justify-content:space-between;
            padding:10px 0;
            border-bottom:1px dashed gray;
        }

        .item:last-child{
            border-bottom:none;
        }

        .price{
            color:green;
            font-weight:bold;
        }

        .footer{
            text-align:center;
            margin-top:20px;
            color:#555;
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="menu-card">
    <h1>🍽 Restaurant Menu</h1>

    <div class="item">
        <span>Veg Biryani</span>
        <span class="price">₹180</span>
    </div>

    <div class="item">
        <span>Chicken Biryani</span>
        <span class="price">₹250</span>
    </div>

    <div class="item">
        <span>Paneer Butter Masala</span>
        <span class="price">₹220</span>
    </div>

    <div class="item">
        <span>Butter Naan</span>
        <span class="price">₹40</span>
    </div>

    <div class="item">
        <span>Cold Coffee</span>
        <span class="price">₹120</span>
    </div>

    <div class="footer">
        Thank You! Visit Again 😊
    </div>
</div>

</body>
</html>
