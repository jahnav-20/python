<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Menu Card</title>

    <style>
        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .menu-card {
            width: 350px;
            background-color: white;
            margin: 50px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px gray;
        }

        h1 {
            text-align: center;
            color: darkred;
        }

        h2 {
            color: green;
            border-bottom: 2px solid orange;
            padding-bottom: 5px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            font-size: 18px;
        }

        .price {
            color: red;
            font-weight: bold;
        }

        .item:hover {
            background-color: #ffe6cc;
            border-radius: 5px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: gray;
        }
    </style>

</head>

<body>

    <div class="menu-card">

        <h1>🍴 Food Menu</h1>

        <h2>Starters</h2>

        <div class="item">
            <span>Veg Manchuria</span>
            <span class="price">₹120</span>
        </div>

        <div class="item">
            <span>Paneer Tikka</span>
            <span class="price">₹180</span>
        </div>

        <h2>Main Course</h2>

        <div class="item">
            <span>Veg Biryani</span>
            <span class="price">₹200</span>
        </div>

        <div class="item">
            <span>Chicken Biryani</span>
            <span class="price">₹250</span>
        </div>

        <h2>Drinks</h2>

        <div class="item">
            <span>Cold Coffee</span>
            <span class="price">₹80</span>
        </div>

        <div class="item">
            <span>Fresh Juice</span>
            <span class="price">₹100</span>
        </div>

        <div class="footer">
            <p>Thank You! Visit Again 😊</p>
        </div>

    </div>

</body>
</html>
