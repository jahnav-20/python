<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Tags Example</title>
</head>
<body>

    <h1 align="center">Image, Audio, Video & Iframe Example</h1>

    <hr>

    <!-- Image -->
    <h2>Image</h2>
    <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=600"
         alt="Laptop Image"
         width="400">

    <hr>

    <!-- Audio -->
    <h2>Audio</h2>
    <audio controls>
        <source src="sample.mp3" type="audio/mpeg">
        Your browser does not support the audio tag.
    </audio>

    <hr>

    <!-- Video -->
    <h2>Video</h2>
    <video width="500" controls>
        <source src="sample.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <hr>

    <!-- 10K Coders Website -->
    <h2>10K Coders Website</h2>
    <iframe
        src="https://www.10kcoders.com/"
        width="800"
        height="500"
        title="10K Coders">
    </iframe>

</body>
</html>
